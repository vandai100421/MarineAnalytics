services:
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: marine_timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marine}
      POSTGRES_DB: ${POSTGRES_DB:-marineanalytics}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: marine_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marine_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-marine}:${POSTGRES_PASSWORD:-marine}@timescaledb:5432/${POSTGRES_DB:-marineanalytics}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["full"]

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: marine_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    profiles: ["full"]

  grafana:
    image: grafana/grafana:11.5.2
    container_name: marine_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles: ["full"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marine_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    restart: unless-stopped
    profiles: ["full"]

volumes:
  timescaledb_data:
  redis_data:
  prometheus_data:
  grafana_data:
